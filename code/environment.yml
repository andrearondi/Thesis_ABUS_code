name: thesis
channels:
  - conda-forge
# channel_priority: strict ensures all packages resolve from conda-forge,
# preventing version conflicts between conda-forge and defaults (rules §12).
channel_priority: strict
dependencies:
  # Python — must match the remote server exactly (docs/server/server_layout.md)
  - python=3.10.20
  # Heavy / native packages from conda-forge
  - numpy=1.26.4
  - pandas=2.2.3
  - scikit-learn=1.5.2
  - matplotlib=3.9.2
  - SimpleITK=2.4.0
  # Pip-installed packages (handles packages absent or awkward in conda-forge)
  - pip
  - pip:
      - pynrrd==1.1.3
      - ruff==0.4.10
      - black==24.10.0
      - mypy==1.11.2
      - pytest==8.3.3
      - hypothesis==6.112.1
      - -e .
